<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="買い物メモ">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="家族で共有できる買い物リストアプリ">
    <title>家族の買い物メモ</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23667eea;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%23764ba2;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='200' height='200' rx='40' fill='url(%23grad)'/%3E%3Ctext x='100' y='130' font-size='100' text-anchor='middle' fill='white'%3E🛒%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 60px rgba(0,0,0,0.3);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: max(30px, env(safe-area-inset-top)) 20px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .list-selector {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .list-selector select {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            color: #333;
        }
        .list-selector button {
            padding: 8px 12px;
            background: rgba(255,255,255,0.3);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 20px;
            cursor: pointer;
            white-space: nowrap;
        }
        .list-selector button:active { background: rgba(255,255,255,0.4); }
        .family-name { font-size: 16px; opacity: 0.9; margin-bottom: 5px; }
        .list-id-display { font-size: 11px; opacity: 0.7; font-family: monospace; }
        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.9;
        }
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-indicator.offline { background: #f87171; animation: none; }
        .share-section { background: #f8f9fa; padding: 15px 20px; border-bottom: 1px solid #e0e0e0; }
        .share-button {
            width: 100%;
            padding: 12px;
            background: #06c755;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .share-button:active { background: #05b04d; transform: scale(0.98); }
        .input-section {
            padding: 20px;
            border-bottom: 2px solid #f0f0f0;
            background: white;
            position: sticky;
            top: 180px;
            z-index: 99;
        }
        .input-group { display: flex; gap: 10px; }
        #itemInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            -webkit-user-select: text;
            user-select: text;
        }
        #itemInput:focus { outline: none; border-color: #667eea; }
        #addButton {
            padding: 15px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #addButton:active { background: #5568d3; transform: scale(0.98); }
        .list-section { padding: 20px; min-height: 300px; }
        .list-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .list-item.checked { opacity: 0.5; background: #e9ecef; }
        .list-item.checked .item-text { text-decoration: line-through; color: #6c757d; }
        .checkbox { width: 24px; height: 24px; margin-right: 15px; cursor: pointer; }
        .item-text { flex: 1; font-size: 16px; color: #333; -webkit-user-select: text; user-select: text; }
        .delete-button {
            padding: 8px 15px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .delete-button:active { background: #c82333; transform: scale(0.98); }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state svg { width: 80px; height: 80px; margin-bottom: 20px; opacity: 0.3; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal-content h2 { margin-bottom: 20px; color: #333; }
        .modal-content p { margin-bottom: 15px; color: #666; font-size: 14px; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            -webkit-user-select: text;
            user-select: text;
        }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .modal-button.primary { background: #667eea; color: white; }
        .modal-button.primary:active { background: #5568d3; }
        .modal-button.secondary { background: #e9ecef; color: #333; }
        .modal-button.secondary:active { background: #dee2e6; }
        .saved-lists { margin-top: 20px; text-align: left; max-height: 300px; overflow-y: auto; }
        .saved-list-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .saved-list-item strong { display: block; margin-bottom: 4px; }
        .saved-list-item small { color: #666; font-family: monospace; font-size: 10px; }
        .saved-list-item button {
            padding: 6px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: calc(80px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 2000;
            max-width: 90%;
        }
        .toast.show { opacity: 1; }
        .install-prompt {
            background: #667eea;
            color: white;
            padding: 15px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .install-prompt.show { display: flex; }
        .install-prompt button {
            padding: 8px 16px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .install-prompt button:active { background: #f0f0f0; }
        .close-install { background: transparent !important; color: white !important; font-size: 20px; padding: 4px 8px !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="install-prompt" id="installPrompt">
            <span>📱 アプリとしてインストールできます</span>
            <div style="display: flex; gap: 8px;">
                <button id="installButton">インストール</button>
                <button class="close-install" id="closeInstall">×</button>
            </div>
        </div>
        <div class="header">
            <h1>🛒 買い物メモ</h1>
            <div class="list-selector">
                <select id="listSelector"><option value="">リストを選択...</option></select>
                <button id="manageListsButton" title="リスト管理">⚙️</button>
            </div>
            <div class="family-name" id="familyName">買い物リスト</div>
            <div class="list-id-display">ID: <span id="listIdDisplay">-</span></div>
            <div class="status-bar">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">接続中...</span>
            </div>
        </div>
        <div class="share-section">
            <button class="share-button" id="shareButton"><span>📱</span><span>招待リンクをコピー（LINEで共有）</span></button>
        </div>
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="itemInput" placeholder="買うものを入力..." />
                <button id="addButton">追加</button>
            </div>
        </div>
        <div class="list-section" id="listSection">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 11l3 3L22 4"></path>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                </svg>
                <p>買い物リストが空です</p>
            </div>
        </div>
    </div>
    <div class="modal" id="nameModal">
        <div class="modal-content">
            <h2>リスト名を設定</h2>
            <p>このリストに名前を付けてください</p>
            <input type="text" id="familyNameInput" placeholder="例：家族、実家、会社" />
            <div class="modal-buttons">
                <button class="modal-button primary" id="saveNameButton">保存</button>
            </div>
        </div>
    </div>
    <div class="modal" id="manageModal">
        <div class="modal-content">
            <h2>リスト管理</h2>
            <div style="margin-bottom: 20px;">
                <button class="modal-button primary" id="createNewListButton" style="width: 100%;">➕ 新しいリストを作成</button>
            </div>
            <div class="saved-lists" id="savedLists"></div>
            <div class="modal-buttons" style="margin-top: 20px;">
                <button class="modal-button secondary" id="closeManageButton">閉じる</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAe1O5irhlh_AdsTXbio-PfGXffz7N6aow",
            authDomain: "shopping-list-54e1c.firebaseapp.com",
            projectId: "shopping-list-54e1c",
            storageBucket: "shopping-list-54e1c.firebasestorage.app",
            messagingSenderId: "613415694699",
            appId: "1:613415694699:web:ca7bf0296f0487894adc2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let unsubscribe = null;
        let currentListId = null;
        let savedLists = {};

        const itemInput = document.getElementById('itemInput');
        const addButton = document.getElementById('addButton');
        const listSection = document.getElementById('listSection');
        const shareButton = document.getElementById('shareButton');
        const nameModal = document.getElementById('nameModal');
        const familyNameInput = document.getElementById('familyNameInput');
        const saveNameButton = document.getElementById('saveNameButton');
        const familyNameDisplay = document.getElementById('familyName');
        const listIdDisplay = document.getElementById('listIdDisplay');
        const toast = document.getElementById('toast');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const listSelector = document.getElementById('listSelector');
        const manageListsButton = document.getElementById('manageListsButton');
        const manageModal = document.getElementById('manageModal');
        const closeManageButton = document.getElementById('closeManageButton');
        const createNewListButton = document.getElementById('createNewListButton');
        const savedListsContainer = document.getElementById('savedLists');

        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installButton = document.getElementById('installButton');
        const closeInstall = document.getElementById('closeInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.classList.add('show');
        });
        installButton.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                installPrompt.classList.remove('show');
            }
        });
        closeInstall.addEventListener('click', () => installPrompt.classList.remove('show'));

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js').catch(err => console.log('SW error:', err));
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function loadSavedLists() {
            const saved = localStorage.getItem('savedLists');
            return saved ? JSON.parse(saved) : {};
        }

        function saveSavedLists() {
            localStorage.setItem('savedLists', JSON.stringify(savedLists));
        }

        function addToSavedLists(listId, name) {
            savedLists[listId] = { name: name, lastUsed: Date.now() };
            saveSavedLists();
            updateListSelector();
        }

        function removeFromSavedLists(listId) {
            delete savedLists[listId];
            saveSavedLists();
            updateListSelector();
        }

        function updateListSelector() {
            listSelector.innerHTML = '<option value="">リストを選択...</option>';
            const sortedLists = Object.entries(savedLists).sort((a, b) => b[1].lastUsed - a[1].lastUsed);
            sortedLists.forEach(([listId, data]) => {
                const option = document.createElement('option');
                option.value = listId;
                option.textContent = data.name;
                if (listId === currentListId) option.selected = true;
                listSelector.appendChild(option);
            });
        }

        function displaySavedLists() {
            const sortedLists = Object.entries(savedLists).sort((a, b) => b[1].lastUsed - a[1].lastUsed);
            if (sortedLists.length === 0) {
                savedListsContainer.innerHTML = '<p style="text-align: center; color: #999;">保存済みリストがありません</p>';
                return;
            }
            savedListsContainer.innerHTML = sortedLists.map(([listId, data]) => `
                <div class="saved-list-item">
                    <div><strong>${escapeHtml(data.name)}</strong><small>${listId}</small></div>
                    <button onclick="window.deleteSavedList('${listId}')">削除</button>
                </div>
            `).join('');
        }

        function getListId() {
            const params = new URLSearchParams(window.location.search);
            let listId = params.get('list');
            if (listId) return listId;
            const lastUsedListId = localStorage.getItem('lastUsedListId');
            if (lastUsedListId && savedLists[lastUsedListId]) return lastUsedListId;
            const sortedLists = Object.entries(savedLists).sort((a, b) => b[1].lastUsed - a[1].lastUsed);
            if (sortedLists.length > 0) return sortedLists[0][0];
            return null;
        }

        async function switchList(listId) {
            if (unsubscribe) unsubscribe();
            currentListId = listId;
            localStorage.setItem('lastUsedListId', listId);
            if (savedLists[listId]) {
                savedLists[listId].lastUsed = Date.now();
                saveSavedLists();
            }
            const newUrl = `${window.location.pathname}?list=${listId}`;
            window.history.replaceState({}, '', newUrl);
            listIdDisplay.textContent = listId;
            updateListSelector();
            setupRealtimeListener();
            const name = await loadFamilyName();
            if (name) {
                familyNameDisplay.textContent = name;
            } else {
                familyNameDisplay.textContent = '買い物リスト';
            }
        }

        function createNewList() {
            const newListId = Math.random().toString(36).substring(2, 15);
            manageModal.classList.remove('active');
            nameModal.classList.add('active');
            switchList(newListId);
        }

        window.deleteSavedList = function(listId) {
            if (confirm('このリストを削除しますか？\n（Firebaseのデータは削除されません）')) {
                removeFromSavedLists(listId);
                displaySavedLists();
                if (listId === currentListId) {
                    const sortedLists = Object.entries(savedLists).sort((a, b) => b[1].lastUsed - a[1].lastUsed);
                    if (sortedLists.length > 0) {
                        switchList(sortedLists[0][0]);
                    } else {
                        createNewList();
                    }
                }
            }
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderList(items) {
            if (!items || items.length === 0) {
                listSection.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                        </svg>
                        <p>買い物リストが空です</p>
                    </div>
                `;
                return;
            }
            listSection.innerHTML = items.map((item) => `
                <div class="list-item ${item.checked ? 'checked' : ''}" data-id="${item.id}">
                    <input type="checkbox" class="checkbox" ${item.checked ? 'checked' : ''} 
                           onchange="window.toggleItem('${item.id}', ${!item.checked})">
                    <span class="item-text">${escapeHtml(item.text)}</span>
                    <button class="delete-button" onclick="window.deleteItem('${item.id}')">削除</button>
                </div>
            `).join('');
        }
        async function addItem() {
            const text = itemInput.value.trim();
            if (!text) return;
            try {
                const listRef = doc(db, 'shopping_lists', currentListId);
                const listSnap = await getDoc(listRef);
                const currentData = listSnap.exists() ? listSnap.data() : { items: [] };
                const newItem = {
                    id: Date.now().toString(),
                    text: text,
                    checked: false,
                    timestamp: Date.now()
                };
                currentData.items.push(newItem);
                await setDoc(listRef, currentData);
                itemInput.value = '';
            } catch (error) {
                console.error('追加エラー:', error);
                showToast('追加に失敗しました');
            }
        }

        window.toggleItem = async function(itemId, checked) {
            try {
                const listRef = doc(db, 'shopping_lists', currentListId);
                const listSnap = await getDoc(listRef);
                const currentData = listSnap.data();
                const itemIndex = currentData.items.findIndex(item => item.id === itemId);
                if (itemIndex !== -1) {
                    currentData.items[itemIndex].checked = checked;
                    await setDoc(listRef, currentData);
                }
            } catch (error) {
                console.error('更新エラー:', error);
                showToast('更新に失敗しました');
            }
        };

        window.deleteItem = async function(itemId) {
            try {
                const listRef = doc(db, 'shopping_lists', currentListId);
                const listSnap = await getDoc(listRef);
                const currentData = listSnap.data();
                currentData.items = currentData.items.filter(item => item.id !== itemId);
                await setDoc(listRef, currentData);
            } catch (error) {
                console.error('削除エラー:', error);
                showToast('削除に失敗しました');
            }
        };

        function setupRealtimeListener() {
            const listRef = doc(db, 'shopping_lists', currentListId);
            unsubscribe = onSnapshot(listRef, 
                (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        renderList(data.items || []);
                    } else {
                        renderList([]);
                    }
                    statusText.textContent = 'リアルタイム同期中';
                    statusIndicator.classList.remove('offline');
                }, 
                (error) => {
                    console.error('リスナーエラー:', error);
                    statusText.textContent = '同期エラー';
                    statusIndicator.classList.add('offline');
                }
            );
        }

        async function loadFamilyName() {
            try {
                const nameRef = doc(db, 'family_names', currentListId);
                const nameSnap = await getDoc(nameRef);
                return nameSnap.exists() ? nameSnap.data().name : null;
            } catch (error) {
                console.error('家族名読み込みエラー:', error);
                return null;
            }
        }

        async function saveFamilyName(name) {
            try {
                const nameRef = doc(db, 'family_names', currentListId);
                await setDoc(nameRef, { name: name });
                addToSavedLists(currentListId, name);
            } catch (error) {
                console.error('家族名保存エラー:', error);
            }
        }

        saveNameButton.addEventListener('click', async () => {
            const name = familyNameInput.value.trim();
            if (name) {
                await saveFamilyName(name);
                familyNameDisplay.textContent = name;
                nameModal.classList.remove('active');
                familyNameInput.value = '';
            }
        });

        shareButton.addEventListener('click', async () => {
            const inviteLink = `${window.location.origin}${window.location.pathname}?list=${currentListId}`;
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: '買い物メモ - ' + familyNameDisplay.textContent,
                        text: '買い物リストを共有します',
                        url: inviteLink
                    });
                    return;
                } catch (error) {
                    if (error.name === 'AbortError') return;
                }
            }
            try {
                await navigator.clipboard.writeText(inviteLink);
                showToast('リンクをコピーしました！LINEで共有してください');
            } catch (error) {
                const textarea = document.createElement('textarea');
                textarea.value = inviteLink;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('リンクをコピーしました！LINEで共有してください');
            }
        });

        listSelector.addEventListener('change', (e) => {
            if (e.target.value) switchList(e.target.value);
        });

        manageListsButton.addEventListener('click', () => {
            displaySavedLists();
            manageModal.classList.add('active');
        });

        closeManageButton.addEventListener('click', () => {
            manageModal.classList.remove('active');
        });

        createNewListButton.addEventListener('click', () => {
            createNewList();
        });

        addButton.addEventListener('click', addItem);
        itemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addItem();
            }
        });

        async function init() {
            try {
                savedLists = loadSavedLists();
                updateListSelector();
                let listId = getListId();
                if (!listId) {
                    listId = Math.random().toString(36).substring(2, 15);
                    nameModal.classList.add('active');
                }
                const params = new URLSearchParams(window.location.search);
                if (params.get('list') && !savedLists[listId]) {
                    const name = await loadFamilyName();
                    if (name) {
                        addToSavedLists(listId, name);
                    } else {
                        nameModal.classList.add('active');
                    }
                }
                await switchList(listId);
            } catch (error) {
                console.error('初期化エラー:', error);
                statusText.textContent = '接続エラー';
                statusIndicator.classList.add('offline');
            }
        }
        init();
    </script>
</body>
</html>
