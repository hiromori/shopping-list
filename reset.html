<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リセット - 買い物メモ</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .info-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        .info-box h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .info-box pre {
            background: white;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
            margin: 10px 0;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        .reset-button {
            background: #dc3545;
            color: white;
        }
        .reset-button:hover {
            background: #c82333;
        }
        .back-button {
            background: #667eea;
            color: white;
        }
        .back-button:hover {
            background: #5568d3;
        }
        .success {
            color: #28a745;
            font-weight: bold;
            margin: 20px 0;
            display: none;
        }
        .warning {
            color: #dc3545;
            margin-bottom: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 リセット</h1>
        
        <div class="warning">
            ⚠️ 保存済みリストの情報が削除されます<br>
            （Firebaseのデータは削除されません）
        </div>

        <div class="info-box">
            <h3>現在の状態</h3>
            <pre id="currentState">読み込み中...</pre>
        </div>

        <button class="reset-button" onclick="resetData()">
            🗑️ 全てリセット
        </button>
        
        <button class="back-button" onclick="goBack()">
            ← アプリに戻る
        </button>

        <div class="success" id="successMessage">
            ✅ リセット完了！アプリを開き直してください。
        </div>
    </div>

    <script>
        function displayCurrentState() {
            const state = {
                savedLists: localStorage.getItem('savedLists'),
                lastUsedListId: localStorage.getItem('lastUsedListId')
            };

            const stateElement = document.getElementById('currentState');
            
            if (!state.savedLists && !state.lastUsedListId) {
                stateElement.textContent = '保存されているデータはありません';
            } else {
                let output = '';
                
                if (state.savedLists) {
                    output += '保存済みリスト:\n';
                    try {
                        const lists = JSON.parse(state.savedLists);
                        output += JSON.stringify(lists, null, 2) + '\n\n';
                    } catch (e) {
                        output += state.savedLists + '\n\n';
                    }
                }
                
                if (state.lastUsedListId) {
                    output += '最後に使用したリストID:\n' + state.lastUsedListId;
                }
                
                stateElement.textContent = output;
            }
        }

        function resetData() {
            if (confirm('本当に全てリセットしますか？\n\n保存済みリストの情報が削除されます。\n（Firebaseのデータは削除されません）')) {
                // LocalStorageをクリア
                localStorage.removeItem('savedLists');
                localStorage.removeItem('lastUsedListId');
                
                // URLパラメータもクリア
                window.history.replaceState({}, '', window.location.pathname);
                
                // 成功メッセージを表示
                document.getElementById('successMessage').style.display = 'block';
                
                // 状態を再表示
                displayCurrentState();
                
                // 3秒後にアプリにリダイレクト
                setTimeout(() => {
                    window.location.href = './shopping-list.html';
                }, 3000);
            }
        }

        function goBack() {
            window.location.href = './shopping-list.html';
        }

        // 初期表示
        displayCurrentState();
    </script>
</body>
</html>
